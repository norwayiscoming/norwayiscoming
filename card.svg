<svg width="900" height="340" viewBox="0 0 900 340" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes fillBar {
      from { width: 0px; }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    .b1 { animation: fillBar 1.4s cubic-bezier(0.22,1,0.36,1) 0.2s  both; }
    .b2 { animation: fillBar 1.4s cubic-bezier(0.22,1,0.36,1) 0.35s both; }
    .b3 { animation: fillBar 1.4s cubic-bezier(0.22,1,0.36,1) 0.5s  both; }
    .b4 { animation: fillBar 1.4s cubic-bezier(0.22,1,0.36,1) 0.28s both; }
    .b5 { animation: fillBar 1.4s cubic-bezier(0.22,1,0.36,1) 0.43s both; }
    .b6 { animation: fillBar 1.4s cubic-bezier(0.22,1,0.36,1) 0.58s both; }
    .card { animation: fadeIn 0.5s ease-out both; }
  </style>
  <defs>
    <linearGradient id="cBg" x1="0" y1="0" x2="900" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#030803"/>
      <stop offset="100%" stop-color="#030a06"/>
    </linearGradient>
    <linearGradient id="barL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#00ff41"/>
      <stop offset="100%" stop-color="#00e676"/>
    </linearGradient>
    <linearGradient id="barR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#00c853"/>
      <stop offset="100%" stop-color="#69f0ae"/>
    </linearGradient>
    <linearGradient id="cDiv" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#00ff41" stop-opacity="0"/>
      <stop offset="25%"  stop-color="#00ff41" stop-opacity="0.5"/>
      <stop offset="75%"  stop-color="#00ff41" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00ff41" stop-opacity="0"/>
    </linearGradient>
    <pattern id="cdots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="11" cy="11" r="0.65" fill="#00ff41" opacity="0.14"/>
    </pattern>
  </defs>

  <g class="card">
    <rect width="900" height="340" fill="url(#cBg)"/>
    <rect width="900" height="340" fill="url(#cdots)"/>

    <!-- border -->
    <rect x="1" y="1" width="898" height="338" rx="3" fill="none" stroke="#0f2e0f" stroke-width="1.5"/>

    <!-- corner brackets -->
    <path d="M28 28 L28 62 M28 28 L62 28" stroke="#00ff41" stroke-width="2.5" stroke-linecap="square"/>
    <circle cx="28" cy="28" r="3" fill="#00ff41"/>
    <path d="M872 28 L872 62 M872 28 L838 28" stroke="#00ff41" stroke-width="2.5" stroke-linecap="square"/>
    <circle cx="872" cy="28" r="3" fill="#00ff41"/>
    <path d="M28 312 L28 278 M28 312 L62 312" stroke="#00ff41" stroke-width="2.5" stroke-linecap="square"/>
    <circle cx="28" cy="312" r="3" fill="#00ff41"/>
    <path d="M872 312 L872 278 M872 312 L838 312" stroke="#00ff41" stroke-width="2.5" stroke-linecap="square"/>
    <circle cx="872" cy="312" r="3" fill="#00ff41"/>

    <!-- ── IDENTITY SECTION ── -->

    <!-- UNIT -->
    <text x="48" y="68"  font-family="'Courier New', monospace" font-size="11" fill="#2d6e2d" letter-spacing="2">UNIT</text>
    <text x="190" y="68" font-family="'Courier New', monospace" font-size="17" font-weight="bold" fill="#e8f5e8">Anh Ngo  /  Norway</text>

    <!-- ARCHETYPE -->
    <text x="48" y="102" font-family="'Courier New', monospace" font-size="11" fill="#2d6e2d" letter-spacing="2">ARCHETYPE</text>
    <text x="190" y="102" font-family="'Courier New', monospace" font-size="15" fill="#00ff41">AI Engineer  ·  Product Owner  ·  Researcher</text>

    <!-- CURRENTLY -->
    <text x="48" y="136" font-family="'Courier New', monospace" font-size="11" fill="#2d6e2d" letter-spacing="2">CURRENTLY</text>
    <text x="190" y="136" font-family="'Courier New', monospace" font-size="15" fill="#69f0ae">Product Owner @ BSMLABS</text>

    <!-- divider -->
    <rect x="36" y="154" width="828" height="1" fill="url(#cDiv)"/>

    <!-- center vertical divider for stats -->
    <line x1="450" y1="156" x2="450" y2="318" stroke="#0f2e0f" stroke-width="1"/>

    <!-- ── LEFT COLUMN STATS ── -->

    <!-- AGENT SYSTEMS  92% → 184/200 -->
    <text x="48"  y="182" font-family="'Courier New', monospace" font-size="12" fill="#4a8f4a">AGENT SYSTEMS</text>
    <rect  x="48" y="190" width="200" height="12" rx="3" fill="#0a1e0a"/>
    <rect class="b1" x="48" y="190" width="184" height="12" rx="3" fill="url(#barL)"/>
    <text x="258" y="201" font-family="'Courier New', monospace" font-size="12" fill="#00ff41">92</text>

    <!-- LLM / NLP  88% → 176/200 -->
    <text x="48"  y="234" font-family="'Courier New', monospace" font-size="12" fill="#4a8f4a">LLM / NLP</text>
    <rect  x="48" y="242" width="200" height="12" rx="3" fill="#0a1e0a"/>
    <rect class="b2" x="48" y="242" width="176" height="12" rx="3" fill="url(#barL)"/>
    <text x="258" y="253" font-family="'Courier New', monospace" font-size="12" fill="#00ff41">88</text>

    <!-- PRODUCT DESIGN  85% → 170/200 -->
    <text x="48"  y="286" font-family="'Courier New', monospace" font-size="12" fill="#4a8f4a">PRODUCT DESIGN</text>
    <rect  x="48" y="294" width="200" height="12" rx="3" fill="#0a1e0a"/>
    <rect class="b3" x="48" y="294" width="170" height="12" rx="3" fill="url(#barL)"/>
    <text x="258" y="305" font-family="'Courier New', monospace" font-size="12" fill="#00ff41">85</text>

    <!-- ── RIGHT COLUMN STATS ── -->

    <!-- EVAL HARNESS  80% → 160/200 -->
    <text x="476"  y="182" font-family="'Courier New', monospace" font-size="12" fill="#4a8f4a">EVAL HARNESS</text>
    <rect  x="476" y="190" width="200" height="12" rx="3" fill="#0a1e0a"/>
    <rect class="b4" x="476" y="190" width="160" height="12" rx="3" fill="url(#barR)"/>
    <text x="686" y="201" font-family="'Courier New', monospace" font-size="12" fill="#69f0ae">80</text>

    <!-- MLOPS / INFRA  72% → 144/200 -->
    <text x="476"  y="234" font-family="'Courier New', monospace" font-size="12" fill="#4a8f4a">MLOPS / INFRA</text>
    <rect  x="476" y="242" width="200" height="12" rx="3" fill="#0a1e0a"/>
    <rect class="b5" x="476" y="242" width="144" height="12" rx="3" fill="url(#barR)"/>
    <text x="686" y="253" font-family="'Courier New', monospace" font-size="12" fill="#69f0ae">72</text>

    <!-- BLOCKCHAIN AI  60% → 120/200 -->
    <text x="476"  y="286" font-family="'Courier New', monospace" font-size="12" fill="#4a8f4a">BLOCKCHAIN AI</text>
    <rect  x="476" y="294" width="200" height="12" rx="3" fill="#0a1e0a"/>
    <rect class="b6" x="476" y="294" width="120" height="12" rx="3" fill="url(#barR)"/>
    <text x="686" y="305" font-family="'Courier New', monospace" font-size="12" fill="#69f0ae">60</text>
  </g>
</svg>
